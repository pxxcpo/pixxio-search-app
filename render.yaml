services:
  - type: web
    name: pixxio-search-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PIXXIO_API_KEY
        sync: false
      - key: PIXXIO_BASE_URL
        sync: false
      - key: MCP_SERVER_URL
        value: https://pixxio-mcp-server-new.onrender.com/mcp
